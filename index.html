<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Coffee Finder Pro | Encuentra tu café ideal</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>

    <header class="search-container">
        <div class="search-box">
            <i class="fas fa-search"></i>
            <input type="text" id="searchInput" placeholder="Search perfect coffee (e.g. Starbucks, Pergamino)...">
            <button id="searchBtn">Find</button>
        </div>
    </header>

    <main class="app-layout">
        <section id="map"></section>

        <aside class="side-panel">
            <div class="panel-header">
                <h2>Nearby Places</h2>
                <span id="resultCount">0 places found</span>
            </div>
            
            <div id="resultsList" class="results-list">
                <div class="empty-state">
                    <i class="fas fa-mug-hot"></i>
                    <p>Move the map and click search to find cafes in that area.</p>
                </div>
            </div>
        </aside>
    </main>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="assets/js/main.js"></script>
</body>
</html>
